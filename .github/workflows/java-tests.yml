name: Java Tests and Coverage

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build and run tests with JaCoCo
      run: |
        mvn clean test jacoco:report -B -DskipITs -ntp -Dtest=*UseCase*Test,*Gateway*Test
      continue-on-error: true

    - name: Upload JaCoCo report artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: jacoco-report
        path: target/site/jacoco/
        if-no-files-found: ignore
        retention-days: 30

    - name: Upload Surefire test reports artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: surefire-reports
        path: target/surefire-reports/
        if-no-files-found: ignore
        retention-days: 30


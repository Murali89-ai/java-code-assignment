name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Run Tests
      run: mvn test

    - name: Generate JaCoCo Code Coverage Report
      run: mvn jacoco:report
      continue-on-error: true

    - name: Check JaCoCo Coverage
      run: mvn jacoco:check
      continue-on-error: true

    - name: Upload JaCoCo Report to Codecov
      uses: codecov/codecov-action@v3
      if: always()
      with:
        files: ./target/site/jacoco/jacoco.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        verbose: true

    - name: Archive test reports
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-reports
        path: target/surefire-reports/
        retention-days: 30

    - name: Archive JaCoCo coverage reports
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: jacoco-report
        path: target/site/jacoco/
        retention-days: 30

    - name: Upload Coverage Summary
      if: always()
      run: |
        echo "::notice title=Coverage Report::JaCoCo coverage report available in artifacts (jacoco-report)"

